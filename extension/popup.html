<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --ink: #17211b;
        --muted: #627069;
        --paper: #fbf7ec;
        --card: rgba(255, 252, 244, 0.9);
        --line: rgba(23, 33, 27, 0.14);
        --green: #1f8a5b;
        --red: #c2412d;
        --amber: #b7791f;
        --blue: #2f6f9f;
        --shadow: 0 18px 50px rgba(35, 43, 36, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 390px;
        margin: 0;
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at 12% -10%, rgba(31, 138, 91, 0.24), transparent 34%),
          radial-gradient(circle at 100% 18%, rgba(183, 121, 31, 0.2), transparent 30%),
          linear-gradient(145deg, #fff9ea 0%, #edf4e9 100%);
      }

      .shell {
        padding: 14px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 16px;
        background: linear-gradient(135deg, rgba(255, 252, 244, 0.96), rgba(221, 238, 222, 0.9));
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -36px;
        top: -44px;
        width: 128px;
        height: 128px;
        border-radius: 999px;
        background: repeating-linear-gradient(45deg, rgba(47, 111, 159, 0.18), rgba(47, 111, 159, 0.18) 8px, transparent 8px, transparent 16px);
      }

      .kicker {
        font: 700 10px/1.1 ui-monospace, SFMono-Regular, Consolas, monospace;
        letter-spacing: 0.18em;
        color: var(--green);
        text-transform: uppercase;
      }

      h1 {
        margin: 5px 0 10px;
        font-size: 24px;
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        padding: 7px 10px;
        font: 700 12px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--red);
        box-shadow: 0 0 0 4px rgba(194, 65, 45, 0.14);
      }

      .connected .dot {
        background: var(--green);
        box-shadow: 0 0 0 4px rgba(31, 138, 91, 0.16);
      }

      .connecting .dot {
        background: var(--amber);
        box-shadow: 0 0 0 4px rgba(183, 121, 31, 0.16);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 13px;
        padding: 10px 9px;
        cursor: pointer;
        color: #fff;
        background: var(--ink);
        font: 700 12px/1.15 ui-monospace, SFMono-Regular, Consolas, monospace;
        transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(23, 33, 27, 0.18);
      }

      button.secondary {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
      }

      button.blue {
        background: var(--blue);
      }

      .card {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px;
        background: var(--card);
        box-shadow: 0 8px 26px rgba(35, 43, 36, 0.08);
      }

      .card-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
        font: 800 12px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      label {
        display: block;
        margin-top: 8px;
        font: 700 11px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
        color: var(--muted);
      }

      input,
      textarea {
        width: 100%;
        margin-top: 5px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 10px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
        font: 12px/1.35 ui-monospace, SFMono-Regular, Consolas, monospace;
        outline: none;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(47, 111, 159, 0.7);
        box-shadow: 0 0 0 3px rgba(47, 111, 159, 0.14);
      }

      textarea {
        min-height: 70px;
        resize: vertical;
      }

      .meta {
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 6px 8px;
        font-size: 12px;
        line-height: 1.25;
      }

      .meta b {
        color: var(--muted);
        font: 700 11px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .truncate {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .chip {
        border-radius: 999px;
        padding: 5px 8px;
        background: rgba(47, 111, 159, 0.11);
        color: #1d526f;
        font: 700 11px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .empty {
        color: var(--muted);
        font-size: 12px;
      }

      .error {
        display: none;
        margin-top: 10px;
        border: 1px solid rgba(194, 65, 45, 0.28);
        border-radius: 14px;
        padding: 9px 10px;
        color: #8f2f20;
        background: rgba(255, 232, 223, 0.82);
        font-size: 12px;
        line-height: 1.3;
      }

      .footer {
        margin-top: 10px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero" id="statusCard">
        <div class="kicker">Edge Control</div>
        <h1>Browser bridge cockpit</h1>
        <div class="status-row">
          <div id="status" class="pill disconnected"><span class="dot"></span><span id="statusText">disconnected</span></div>
          <div class="pill"><span id="socketState">socket: closed</span></div>
        </div>
        <div class="grid">
          <button id="save" class="blue">Save + reconnect</button>
          <button id="reconnect" class="secondary">Reconnect</button>
          <button id="reloadTab" class="secondary">Reload tab</button>
        </div>
      </section>

      <section class="card">
        <div class="card-title"><span>Connection</span><span id="tokenHint">token ready</span></div>
        <label>
          Bridge URL
          <input id="bridgeUrl" placeholder="ws://127.0.0.1:8765/ext?token=..." />
        </label>
        <label>
          Allowed hosts
          <textarea id="allowedHosts" placeholder="Leave empty for all hosts&#10;localhost&#10;*.example.com"></textarea>
        </label>
        <div class="chips" id="hostChips"></div>
      </section>

      <section class="card">
        <div class="card-title"><span>Active tab</span><span id="frameCount">0 frames</span></div>
        <div class="meta">
          <b>Tab</b><span id="tabId">-</span>
          <b>Title</b><span id="tabTitle" class="truncate">-</span>
          <b>URL</b><span id="tabUrl" class="truncate">-</span>
          <b>Frames</b><span id="frameSummary" class="truncate">-</span>
        </div>
      </section>

      <section class="card">
        <div class="card-title"><span>Recent downloads</span><span id="downloadCount">0</span></div>
        <div id="downloadList" class="empty">No recent downloads.</div>
      </section>

      <div id="lastError" class="error"></div>
      <div class="footer">
        Reload the extension after code changes. Debugger/network features require the new permissions to be accepted.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
